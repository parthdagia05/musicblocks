name: Run Jest Tests on PR

on:
  pull_request_target:
    types:
      - opened
      - synchronize

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run Jest Tests
    runs-on: ubuntu-latest
    permissions: 
      pull-requests: write
      contents: read
      issues: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Jest Tests (PR)
        id: jest
        run: |
          npm test -- --coverage --json --outputFile=jest-results.json || echo "TESTS_FAILED=true" >> $GITHUB_ENV
          cp coverage/coverage-summary.json pr-coverage.json 2>/dev/null || echo "{}" > pr-coverage.json

      - name: Run Jest Tests (base branch)
        run: |
          git fetch origin ${{ github.event.pull_request.base.ref }}:base-branch
          git worktree add base-copy base-branch
          cd base-copy
          npm ci
          npm test -- --coverage || true
          cp coverage/coverage-summary.json ../base-coverage.json 2>/dev/null || echo "{}" > ../base-coverage.json
          cd ..

      - name: Compare coverage (delta check)
        run: |
          COVERAGE_DROPPED=false
          DELTA_REPORT=""
          for metric in statements branches functions lines; do
            PR_PCT=$(jq -r ".total.$metric.pct // 0" pr-coverage.json)
            BASE_PCT=$(jq -r ".total.$metric.pct // 0" base-coverage.json)
            DELTA=$(awk "BEGIN { printf \"%.2f\", $PR_PCT - $BASE_PCT }")
            ARROW="→"
            if awk "BEGIN { exit !($PR_PCT < $BASE_PCT) }"; then
              COVERAGE_DROPPED=true
              ARROW="↓"
            elif awk "BEGIN { exit !($PR_PCT > $BASE_PCT) }"; then
              ARROW="↑"
            fi
            DELTA_REPORT="$DELTA_REPORT- **$metric**: $BASE_PCT% $ARROW $PR_PCT% (Δ $DELTA%)\n"
          done
          echo "COVERAGE_DROPPED=$COVERAGE_DROPPED" >> $GITHUB_ENV
          echo "DELTA_REPORT<<EOF" >> $GITHUB_ENV
          printf "$DELTA_REPORT" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Read Jest Results
        id: results
        run: |
          # Default TESTS_FAILED to false
          if [ -z "$TESTS_FAILED" ]; then
            TESTS_FAILED=false
          fi

          # Set TESTS_PASSED properly
          if [ "$TESTS_FAILED" = "true" ]; then
            TESTS_PASSED=false
            echo "TESTS_PASSED=false" >> $GITHUB_ENV
            FAILED_TESTS=$(jq -r '[.testResults[] | select(.status == "failed") | .name] | map(split("/") | last) | join("\n")' jest-results.json)
            echo "FAILED_TESTS<<EOF" >> $GITHUB_ENV
            echo "$FAILED_TESTS" >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
          else
            TESTS_PASSED=true
            echo "TESTS_PASSED=true" >> $GITHUB_ENV
            echo "FAILED_TESTS=None" >> $GITHUB_ENV
          fi

          # Extract PR number
          PR_NUMBER=$(jq --raw-output .pull_request.number "$GITHUB_EVENT_PATH")

          # Generate a temporary file for the comment
          COMMENT_FILE=$(mktemp)

          # Save variables to GITHUB_OUTPUT
          echo "TESTS_PASSED=$TESTS_PASSED" >> $GITHUB_ENV
          echo "PR_NUMBER=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "COMMENT_FILE=$COMMENT_FILE" >> $GITHUB_OUTPUT

          # Generate content for the comment file
          {
            if [ "$TESTS_PASSED" = "true" ]; then
              if [ "$COVERAGE_DROPPED" = "true" ]; then
                echo "❌ Coverage dropped compared to \`${{ github.event.pull_request.base.ref }}\`. Please add tests for new code."
              else
                echo "✅ All Jest tests passed and coverage did not drop."
              fi
            else
              echo "❌ Some Jest tests failed. Please check the logs and fix the issues before merging."
              echo ""
              echo "**Failed Tests:**"
              echo ""
              echo '```'
              echo "$FAILED_TESTS"
              echo '```'
            fi
            echo ""
            echo "### 📊 Coverage vs \`${{ github.event.pull_request.base.ref }}\`"
            printf "%b" "$DELTA_REPORT"
          } > "$COMMENT_FILE"

      - name: PR comment
        uses: thollander/actions-comment-pull-request@v3
        with:
          file-path: ${{ steps.results.outputs.COMMENT_FILE }}
          pr-number: ${{ steps.results.outputs.PR_NUMBER }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fail if coverage dropped
        if: env.COVERAGE_DROPPED == 'true'
        run: |
          echo "::error::Coverage dropped compared to the base branch. See PR comment for details."
          exit 1
